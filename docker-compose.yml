services:
  mysql:
    image: mysql:8.0
    container_name: ilc-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ilc_root
      MYSQL_DATABASE: ilc_db
    ports:
      - "3306:3306"
    volumes:
      - ilc_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pilc_root"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ilc_mysql_data:
